name: Audit Content Intelligence

on:
  pull_request:
  schedule:
    - cron: '0 14 * * 3'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: node validate.js

      - name: Audit live content intelligence
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL || 'https://api.decantr.ai/v1' }}
        run: node scripts/audit-content-intelligence.js --report-json=content-intelligence-report.json --summary-markdown=content-intelligence-summary.md

      - name: Publish audit summary
        run: cat content-intelligence-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: content-intelligence-audit
          path: |
            content-intelligence-report.json
            content-intelligence-summary.md
          if-no-files-found: error
