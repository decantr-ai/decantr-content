name: Audit Registry Drift

on:
  pull_request:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate content
        run: node validate.js

      - name: Audit live registry drift
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL || 'https://api.decantr.ai/v1' }}
        run: node scripts/audit-registry-drift.js --report-json=registry-drift-report.json --summary-markdown=registry-drift-summary.md

      - name: Publish audit summary
        run: cat registry-drift-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: registry-drift-audit
          path: |
            registry-drift-report.json
            registry-drift-summary.md
          if-no-files-found: error
